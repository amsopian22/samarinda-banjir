name: Update Data Banjir Samarinda

on:
  schedule:
    # Pukul 06:00 WITA = 22:00 UTC hari sebelumnya
    - cron: '0 22 * * *'

  # Izinkan trigger manual dari GitHub UI (tombol "Run workflow")
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan trigger manual'
        required: false
        default: 'Manual update'

jobs:
  update-flood-data:
    name: Jalankan Pipeline dan Export Data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write   # Diperlukan agar bot bisa git push

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: '3.11'
          auto-activate-base: false
          activate-environment: flood_env

      - name: Install Dependencies Geospasial
        shell: bash -el {0}
        run: |
          conda install -c conda-forge \
            geopandas pyproj fiona rasterio \
            numpy pandas scikit-learn joblib \
            -y --quiet
          pip install \
            xgboost requests beautifulsoup4 \
            osmnx psutil \
            --quiet

      - name: Persiapkan Struktur Folder Runtime
        run: |
          mkdir -p data/raw data/processed data/boundary data/dem
          mkdir -p model output cache dashboard/public/data
          echo "Folder runtime siap!"

      - name: Jalankan Pipeline XGBoost Flood Prediction
        shell: bash -el {0}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python main.py

      - name: Export GeoJSON Statis untuk Dashboard Vercel
        shell: bash -el {0}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/export_static.py

      - name: Commit dan Push Data Baru ke GitHub
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard/public/data/

          if git diff --staged --quiet; then
            echo "Tidak ada perubahan data, skip commit."
          else
            TIMESTAMP=$(date +'%Y-%m-%d')
            git commit -m "Auto-update data banjir ${TIMESTAMP}"
            git push
            echo "Data berhasil dipush!"
          fi
